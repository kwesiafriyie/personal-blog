name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # Change to master if your default branch is master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # This official Astro action installs dependencies, builds, and uploads the artifact all in one step
      - name: Deploy with Astro
        id: deployment
        uses: withastro/action@v3